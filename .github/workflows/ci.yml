name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint + Typecheck + Build + CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Biome check (lint + format)
        run: npx biome check src tests

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build (tsup)
        run: npx tsup

      - name: Smoke test — CLI entry
        run: |
          node dist/cli.js --version
          node dist/cli.js --help > /dev/null
          node dist/cli.js apps --help > /dev/null
          node dist/cli.js db create --help > /dev/null
          node dist/cli.js config --help > /dev/null

      - name: Smoke test — MCP entry (does not connect; checks it loads)
        run: |
          # Start MCP server, wait 1s, kill — catches import/runtime errors
          # without needing a real MCP client.
          timeout 1s node dist/mcp.js < /dev/null || [ $? -eq 124 ]

      - name: Smoke test — SSE connector boots + serves status + tools
        run: |
          node dist/connector/server.js &
          CONNECTOR_PID=$!
          sleep 2
          # localhost-only mode (no CONNECTOR_AUTH_TOKEN set)
          curl -fsS http://127.0.0.1:3111/api/status | grep -q '"status":"ok"'
          curl -fsS http://127.0.0.1:3111/api/tools  | grep -q '"count":'
          curl -fsS http://127.0.0.1:3111/          | grep -q 'coolify-11d'
          kill $CONNECTOR_PID
          wait $CONNECTOR_PID 2>/dev/null || true
