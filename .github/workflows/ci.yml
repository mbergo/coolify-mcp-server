name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Typecheck + Unit tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Biome check (lint + format)
        run: npx biome check src tests

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run tests/unit

      - name: Build (tsup)
        run: npx tsup

      - name: Smoke test — CLI
        run: |
          node dist/cli.js --version
          node dist/cli.js --help

  integration:
    name: Integration (live Coolify)
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only run on main branch pushes AND only if the required secrets exist.
    # PRs from forks don't have access to secrets; skip automatically.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: coolify-live
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Check required secrets
        id: check_secrets
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_BASE_URL}" ] || [ -z "${COOLIFY_TOKEN}" ]; then
            echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::COOLIFY_BASE_URL/COOLIFY_TOKEN not set — skipping live tests."
          else
            echo "secrets_ok=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run integration tests
        if: steps.check_secrets.outputs.secrets_ok == 'true'
        env:
          COOLIFY_INTEGRATION: "1"
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: npx vitest run tests/integration --passWithNoTests
